# Xorg configuration for GPU-backed rendering via KMS/modesetting.
# Used when CARBONYL_GPU_MODE=gpu (requires --device=/dev/dri passthrough).
# Supports Intel, AMD, and KMS-compatible NVIDIA cards.

Section "Device"
    Identifier  "kms-device"
    Driver      "modesetting"
    # AccelMethod "glamor"  # uncomment if host + driver combo supports glamor
EndSection

Section "Monitor"
    Identifier  "kms-monitor"
    HorizSync   28.0-80.0
    VertRefresh 48.0-75.0
EndSection

Section "Screen"
    Identifier "kms-screen"
    Device     "kms-device"
    Monitor    "kms-monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "kms-layout"
    Screen     "kms-screen"
EndSection
