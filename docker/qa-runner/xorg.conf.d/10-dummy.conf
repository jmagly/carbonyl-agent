# Xorg configuration for CPU-only (no GPU passthrough) rendering.
# Used when CARBONYL_GPU_MODE=cpu or auto-detected absence of /dev/dri.

Section "Device"
    Identifier  "dummy-device"
    Driver      "dummy"
    VideoRam    65536
EndSection

Section "Monitor"
    Identifier  "dummy-monitor"
    HorizSync   28.0-80.0
    VertRefresh 48.0-75.0
    Modeline "1920x1080" 148.50 1920 2008 2052 2200 1080 1084 1089 1125 +hsync +vsync
    Modeline "1280x800"  83.50  1280 1352 1480 1680 800 803 809 831 -hsync +vsync
EndSection

Section "Screen"
    Identifier "dummy-screen"
    Device     "dummy-device"
    Monitor    "dummy-monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth     24
        Modes     "1920x1080" "1280x800"
        Virtual   1920 1080
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "dummy-layout"
    Screen     "dummy-screen"
    InputDevice "dummy-keyboard" "CoreKeyboard"
    InputDevice "dummy-mouse" "CorePointer"
EndSection

# Fallback input devices — evdev at /etc/X11/xorg.conf.d/20-evdev-input.conf
# takes priority when real /dev/input/event* devices are present.
Section "InputDevice"
    Identifier "dummy-keyboard"
    Driver     "kbd"
EndSection

Section "InputDevice"
    Identifier "dummy-mouse"
    Driver     "mouse"
    Option     "Protocol" "auto"
    Option     "Device"   "/dev/null"
EndSection
